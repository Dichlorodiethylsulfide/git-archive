name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build, test, and self-package
        env:
          GIT_REF_NAME: ${{ github.ref_name }}
        run: bash scripts/ci-self-release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: git-archive-ci-artifacts
          path: dist/release
