name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build, test, and self-package
        env:
          GIT_REF_NAME: ${{ github.ref_name }}
        run: bash scripts/ci-self-release.sh
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/*.jar
            dist/release/*.zip
            dist/release/*-sha256.txt
            dist/release/*-release-manifest.txt
